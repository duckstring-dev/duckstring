name: Release

# Tag a release (e.g. `git tag v0.2.0 && git push origin v0.2.0`) to build and publish to PyPI.
# Publishing uses PyPI Trusted Publishing (OIDC) — configure the `pypi` environment for this repo
# and register the publisher on PyPI (project: duckstring, workflow: release.yml, environment: pypi).

on:
  push:
    tags: ["v*"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -e .[dev]
      - run: ruff check .
      - run: pytest

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      # The web UI is CI-built (src/duckstring/catchment/static/ is gitignored) — a wheel built
      # without this step would silently ship without the UI.
      - run: npm ci
        working-directory: frontend
      - run: make build-frontend
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install build
      - run: python -m build
      # Fail loudly if the wheel is missing its data files (UI or schema).
      - name: Verify wheel contents
        run: |
          wheel=$(ls dist/*.whl)
          unzip -l "$wheel" | grep -q "duckstring/catchment/static/index.html" || { echo "wheel missing web UI"; exit 1; }
          unzip -l "$wheel" | grep -q "duckstring/catchment/schema/001_init.sql" || { echo "wheel missing schema"; exit 1; }
      - name: Verify tag matches package version
        run: |
          pkg_version=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          [ "v$pkg_version" = "${GITHUB_REF_NAME}" ] || { echo "tag ${GITHUB_REF_NAME} != package v$pkg_version"; exit 1; }
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # PyPI Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
